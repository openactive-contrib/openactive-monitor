steps:
  # Build the image from the local folder
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t',
      'gcr.io/openactive-monitor/github.com/openactive-contrib/opportunity-insights:$COMMIT_SHA',
      '-f',
      'jobs/opportunity-insights/Dockerfile',
      'jobs/opportunity-insights'
    ]

  # Push to Artifact Registry / GCR
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      'gcr.io/openactive-monitor/github.com/openactive-contrib/opportunity-insights:$COMMIT_SHA'
    ]

  # Deploy / update the Cloud Run Job.
  #
  # NOTE: the GCS volume mount of bucket "volume-1" is NOT set here because
  # `gcloud run jobs deploy` does not yet have a stable flag pair for adding
  # gcs volumes + volume mounts in a single command across all gcloud
  # versions. Configure the volume once via the GCP Console (see README) –
  # subsequent deploys preserve it.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - '$_JOB_NAME'
      - '--image=gcr.io/openactive-monitor/github.com/openactive-contrib/opportunity-insights:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--set-env-vars=PROJECT_ID=$PROJECT_ID,GCP_PROJECT_ID=openactive-monitor,BQ_DATASET_ID=openactive_analytics,BQ_FEEDS_TABLE=feeds,BQ_FEED_INGESTION_TABLE=feed_ingestion,BQ_OPPORTUNITY_INGESTION_TABLE=opportunity_ingestion,BQ_OPPORTUNITIES_TABLE=opportunities,INSIGHTS_GEO_DIR=/volume-1/data-analysis'
      - '--quiet'

images:
  - 'gcr.io/openactive-monitor/github.com/openactive-contrib/opportunity-insights:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY


substitutions:
  _JOB_NAME: opportunity-insights
  _REGION: europe-west2

