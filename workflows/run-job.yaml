main:
    params: [event]
    steps:
        - setup:
            assign:
                # This was working at first, and then started causing errors:
                # - id_project: sys.get_env("GOOGLE_CLOUD_PROJECT_ID")
                - id_project: "openactive-monitor"
                - name_job: ${text.decode(base64.decode(event.data.message.data))}
        - run_job:
            call: googleapis.run.v1.namespaces.jobs.run
            args:
                name: ${"namespaces/" + id_project + "/jobs/" + name_job}
                location: europe-west2
            result: job_execution
        - finish:
            return: ${job_execution}