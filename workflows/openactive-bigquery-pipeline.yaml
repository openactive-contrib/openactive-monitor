main:
  steps:
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - location: "europe-west2"

    # Step 1: Ingest Feeds
    - run_ingest_feeds:
        call: googleapis.run.v1.namespaces.jobs.run
        args:
          name: ${"namespaces/" + project_id + "/jobs/ingest-feeds"}
          location: ${location}

    # Step 2: Ingest Opportunities
    - run_ingest_opportunities:
        call: googleapis.run.v1.namespaces.jobs.run
        args:
          name: ${"namespaces/" + project_id + "/jobs/ingest-opportunities"}
          location: ${location}
          connector_params:
            timeout: 18000

    # Step 3: Opportunity Insights
    - run_opportunity_insights:
        call: googleapis.run.v1.namespaces.jobs.run
        args:
          name: ${"namespaces/" + project_id + "/jobs/opportunity-insights"}
          location: ${location}